<!DOCTYPE html>

  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 800px;

    }
    .task-card {

      padding: 14px 18px;
      margin: 12px 0;
      border-radius: 0 8px 8px 0;
    }
    .task-content {
      font-size: 1.05em;
      color: #2d3436;
      line-height: 1.5;
    }
    .task-time {
      color: #b2bec3;
      font-size: 0.8em;
      margin-top: 6px;
    }
    .back-link {
      text-align: center;
      margin-top: 40px;
    }
    .back-link a {

      text-decoration: none;
